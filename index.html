<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸 小熊旅費拆帳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- 即時更新通知 -->
<div id="syncToast" class="badge shadow fs-6 py-2 px-3"><i class="fa-solid fa-arrows-rotate fa-spin me-2"></i>資料已即時更新</div>

<!-- 畫面 0: 登入/註冊系統 -->
<div id="pageAuth" class="auth-wrapper hidden">
    <div class="auth-card text-center">
        <div style="font-size: 4rem; margin-bottom: 10px;">🧸</div>
        <h3 class="fw-bold mb-4 text-dark">小熊旅費拆帳</h3>
        
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="authUsername" placeholder="帳號">
            <label for="authUsername"><i class="fa-solid fa-user me-2"></i>帳號</label>
        </div>
        <div class="form-floating mb-4">
            <input type="password" class="form-control" id="authPassword" placeholder="密碼">
            <label for="authPassword"><i class="fa-solid fa-lock me-2"></i>密碼</label>
        </div>
        
        <button class="btn btn-primary w-100 py-3 fw-bold mb-2 shadow-sm" onclick="handleAuth('login')">登入系統</button>
        <button class="btn btn-light w-100 py-3 fw-bold text-primary border" onclick="handleAuth('register')">註冊新帳號</button>
    </div>
</div>

<!-- 起始畫面 (行程列表) -->
<div id="pageList" class="hidden">
    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm py-3">
        <div class="container-app d-flex justify-content-between align-items-center px-3 w-100">
            <span class="navbar-brand mb-0 fw-bold">🧸 小熊旅費拆帳</span>
            <button class="btn btn-sm btn-outline-light rounded-pill" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-1"></i>登出 <span id="displayUsername" class="fw-bold"></span></button>
        </div>
    </nav>
    <div class="container-app px-3">
        
        <div class="card p-4 border-0 shadow-sm border-top border-4 border-warning">
            <h5 class="section-title text-warning border-warning" style="border-left-color: #ffc107 !important;">加入好友行程</h5>
            <div class="input-group input-group-lg">
                <span class="input-group-text bg-warning text-dark fw-bold border-warning"><i class="fa-solid fa-ticket"></i></span>
                <input type="text" id="inviteCodeInput" class="form-control border-warning text-uppercase" placeholder="輸入 6 碼邀請碼..." maxlength="6">
                <button class="btn btn-warning px-4 fw-bold text-dark" onclick="joinTrip()">加入</button>
            </div>
        </div>

        <div class="card p-4 border-0 shadow-sm mt-2">
            <h5 class="section-title">我的旅行計畫</h5>
            <div class="input-group input-group-lg mb-4">
                <input type="text" id="tripTitle" class="form-control border-primary" placeholder="為新旅程取個名字...">
                <button class="btn btn-primary px-4 fw-bold" onclick="addTrip()">建立</button>
            </div>
            <ul id="tripList" class="list-group list-group-flush"></ul>
        </div>
    </div>
</div>

<!-- 詳細畫面 -->
<div id="pageDetail" class="hidden">
    <!-- 頂部導航 -->
    <div class="header-bar">
        <div class="container-app d-flex justify-content-between align-items-center px-3 w-100">
            <div class="d-flex align-items-center flex-grow-1 text-truncate pe-3">
                <button class="btn btn-sm btn-header-back rounded-circle shadow-sm" style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;" onclick="goHome()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h4 id="currentTripTitle" class="mb-0 fw-bold text-truncate ms-3" style="font-size: 1.3rem;"></h4>
            </div>
            <div class="bg-light rounded px-3 py-1 shadow-sm text-center cursor-pointer flex-shrink-0" onclick="copyInviteCode()" title="點擊複製邀請碼" style="border: 2px solid var(--honey-color); color: var(--text-dark);">
                <span class="small d-block fw-bold" style="font-size: 0.65rem;">專屬邀請碼</span>
                <span id="tripInviteCode" class="fw-bold tracking-wide" style="font-size: 1.1rem; letter-spacing: 1px;"></span>
            </div>
        </div>
    </div>

    <!-- 主要內容區塊 -->
    <div class="container-app pt-3 pb-5 mb-5 px-3">
        
        <!-- 分頁 1: 明細列表 -->
        <div id="view-list" class="sub-view">
            <div class="card p-3 mt-2 border-0 shadow-sm">
                <h5 class="section-title text-secondary border-secondary">帳目明細</h5>
                
                <!-- 優化後的兩排篩選工具列 -->
                <div class="filter-bar">
                    <!-- 第一排：搜尋與幣別 -->
                    <div class="row g-2 mb-2">
                        <div class="col-md-8 col-7">
                            <input type="text" id="filterKeyword" class="form-control form-control-sm" placeholder="搜尋關鍵字..." oninput="renderExpenseRecords()">
                        </div>
                        <div class="col-md-4 col-5">
                            <select id="filterCurrency" class="form-select form-select-sm" onchange="renderExpenseRecords()">
                                <option value="">所有幣別</option>
                            </select>
                        </div>
                    </div>
                    <!-- 第二排：日期區間與排序按鈕 -->
                    <div class="row g-2 align-items-center">
                        <div class="col-md-7 col-12 d-flex align-items-center gap-2">
                            <input type="date" id="filterStartDate" class="form-control form-control-sm text-muted" onchange="renderExpenseRecords()">
                            <span class="text-muted small fw-bold">至</span>
                            <input type="date" id="filterEndDate" class="form-control form-control-sm text-muted" onchange="renderExpenseRecords()">
                        </div>
                        <div class="col-md-5 col-12 d-flex gap-2">
                            <button class="btn btn-sm btn-white border flex-grow-1 shadow-sm fw-bold bg-white text-primary" id="sortOrderBtn" onclick="toggleSortOrder()">
                                <i class="fa-solid fa-arrow-down-wide-short"></i> 新到舊
                            </button>
                            <button class="btn btn-sm btn-light border text-danger shadow-sm px-3" onclick="clearFilters()" title="清除篩選">
                                <i class="fa-solid fa-rotate-left"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="expenseRecordList" class="list-group shadow-sm rounded-3"></div>
            </div>
            <button id="fabBtn" class="btn btn-primary fab-btn" onclick="openForm()"><i class="fa-solid fa-plus"></i></button>
        </div>

        <!-- 獨立隱藏表單: 記帳輸入區 -->
        <div id="view-form" class="sub-view hidden">
            <div class="card p-4 shadow-sm" id="mainEntryCard">
                <h5 class="section-title d-flex justify-content-between align-items-center">
                    <span id="formModeTitle">新增花費</span>
                    <div>
                        <button id="clearFormBtn" class="btn btn-sm btn-light border text-secondary shadow-sm" onclick="resetForm()" title="清空"><i class="fa-solid fa-rotate-right"></i></button>
                        <button class="btn btn-sm btn-outline-secondary shadow-sm ms-1" onclick="closeForm()"><i class="fa-solid fa-arrow-left"></i> 返回</button>
                    </div>
                </h5>
                
                <div class="row g-3">
                    <input type="hidden" id="editingExpId">
                    <div class="col-md-6"><label class="small fw-bold">項目</label><input type="text" id="expDesc" class="form-control" placeholder="例：敘敘苑燒肉"></div>
                    <div class="col-6 col-md-3"><label class="small fw-bold">日期</label><input type="date" id="expDate" class="form-control"></div>
                    <div class="col-6 col-md-3"><label class="small fw-bold">時間</label><input type="time" id="expTime" class="form-control"></div>
                    
                    <div class="col-12 col-md-4"><label class="small fw-bold">幣別</label>
                        <select id="expCurr" class="form-select" onchange="fetchRate()">
                            <optgroup label="熱門"><option value="TWD">🇹🇼 台幣</option><option value="JPY">🇯🇵 日幣</option><option value="KRW">🇰🇷 韓元</option><option value="USD">🇺🇸 美金</option><option value="EUR">🇪🇺 歐元</option></optgroup>
                            <optgroup label="亞洲"><option value="HKD">🇭🇰 港幣</option><option value="THB">🇹🇭 泰銖</option><option value="VND">🇻🇳 越南盾</option><option value="SGD">🇸🇬 新加坡幣</option><option value="CNY">🇨🇳 人民幣</option><option value="MOP">🇲🇴 澳門幣</option></optgroup>
                            <optgroup label="歐美/其他"><option value="GBP">🇬🇧 英鎊</option><option value="AUD">🇦🇺 澳幣</option><option value="CAD">🇨🇦 加幣</option><option value="CHF">🇨🇭 瑞士法郎</option></optgroup>
                        </select>
                    </div>
                    <div class="col-6 col-md-4"><label class="small fw-bold text-primary">金額 (原幣)</label><input type="number" id="expAmount" class="form-control fw-bold border-primary" oninput="handleGlobalChange()"></div>
                    <div class="col-6 col-md-4"><label class="small fw-bold">匯率</label><input type="number" id="expRate" class="form-control" value="1.0" step="0.0001" oninput="handleGlobalChange()"></div>
                    
                    <div class="col-12 mt-4">
                        <label class="fw-bold text-success mb-2" style="color: var(--success-soft) !important;"><i class="fa-solid fa-wallet me-2"></i>付款者 (代墊)</label>
                        <div id="payerContainer"></div>
                        <button id="addPayerBtn" class="btn btn-sm btn-light border w-100 mt-2 fw-bold text-secondary shadow-sm" onclick="addRow('payerContainer')">＋ 增加付款人</button>
                    </div>
                    
                    <div class="col-12 mt-4">
                        <div class="d-flex justify-content-between align-items-center mb-2"><label class="fw-bold text-danger" style="color: var(--danger-soft) !important;"><i class="fa-solid fa-users me-2"></i>費用分攤 (應付)</label>
                            <div class="d-flex gap-2">
                                <div class="form-switch d-flex align-items-center"><input class="form-check-input me-1" type="checkbox" id="everyoneToggle" onchange="toggleEveryone()"><label class="small fw-bold" for="everyoneToggle">全體</label></div>
                                <div class="form-switch d-flex align-items-center"><input class="form-check-input me-1" type="checkbox" id="autoSplitToggle" onchange="handleGlobalChange()" checked><label class="small fw-bold" for="autoSplitToggle">平分</label></div>
                            </div>
                        </div>
                        <div id="splitterContainer"></div>
                        <button id="manualAddBtn" class="btn btn-sm btn-light border w-100 mt-2 fw-bold text-secondary shadow-sm" onclick="manualAddSplitRow()">＋ 手動增加成員</button>
                    </div>
                    
                    <div id="validationStatus" class="alert mt-2 py-2 small hidden"></div>
                    <button id="saveBtn" class="btn btn-primary btn-lg w-100 mt-2 shadow fw-bold" onclick="saveExpense()" disabled>儲存帳目</button>
                </div>
            </div>
        </div>

        <!-- 分頁 2: 結算 -->
        <div id="view-settlement" class="sub-view hidden">
            <!-- 結帳完成度 -->
            <div class="card p-3 border-0 shadow-sm mb-4">
                <h5 class="section-title">結帳完成度</h5>
                <div id="repaymentProgressBar" class="progress mb-2" style="height: 22px; border-radius: 50px; background-color: #fdf5ec;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated fw-bold" style="width: 0%; background-color: var(--bear-brown);">0%</div>
                </div>
                <p id="progressText" class="text-center small text-muted mb-0"></p>
            </div>

            <!-- 還款登記 -->
            <div class="card p-3 shadow-sm mb-4" id="repaymentCard" style="background-color: #fdf5ec; border: 1px solid #e5d3c3 !important;">
                <h5 class="section-title d-flex justify-content-between align-items-center">
                    <span id="repFormTitle">還款登記</span>
                    <button id="cancelRepEditBtn" class="btn btn-sm btn-link text-danger p-0 hidden" onclick="resetRepaymentForm()">取消</button>
                </h5>
                <input type="hidden" id="editingRepId">
                <div class="row g-2 align-items-center mb-3">
                    <div class="col-5"><label class="small fw-bold text-muted">還款人</label><select id="repSender" class="form-select form-select-sm user-select border-0 shadow-sm" onchange="validateRepSelect()"></select></div>
                    <div class="col-2 text-center pt-3"><div class="swap-btn mx-auto shadow-sm" onclick="swapRepUsers()" style="border-color:#e5d3c3; color:var(--bear-brown);"><i class="fa-solid fa-right-left"></i></div></div>
                    <div class="col-5"><label class="small fw-bold text-muted">收款人</label><select id="repReceiver" class="form-select form-select-sm user-select border-0 shadow-sm" onchange="validateRepSelect()"></select></div>
                    <div class="col-12 mt-2">
                        <div class="input-group shadow-sm rounded">
                            <span class="input-group-text bg-white text-dark fw-bold border-0">NT$</span>
                            <input type="number" id="repAmount" class="form-control fw-bold border-0" placeholder="金額">
                            <button class="btn btn-primary px-4 fw-bold" onclick="saveRepayment()"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
                <label class="small fw-bold text-muted mb-2"><i class="fa-solid fa-history me-1"></i>歷史紀錄</label>
                <div id="repaymentHistory" class="bg-white rounded p-2 shadow-sm" style="max-height: 150px; overflow-y: auto; border: 1px solid #e5d3c3;"></div>
            </div>

            <!-- 成員結算餘額 -->
            <div class="card p-4 border-0 shadow-sm">
                <h5 class="section-title">目前成員結算餘額</h5>
                <div id="settlementBox" class="row g-3 mt-2"></div>
            </div>
        </div>

        <!-- 分頁 3: 成員與設定 -->
        <div id="view-members" class="sub-view hidden">
            <div class="card p-4 shadow-sm">
                <h5 class="section-title">旅伴名單</h5>
                <div id="memberWarning" class="alert alert-warning fw-bold text-center mb-3 hidden">⚠️ 旅程至少需要 2 名成員才能開始記帳與結算！</div>
                <div class="input-group mb-3">
                    <input type="text" id="userName" class="form-control border-primary" placeholder="輸入姓名...">
                    <button class="btn btn-primary fw-bold" onclick="addUser()">加入</button>
                </div>
                <div id="userActionList" class="list-group list-group-flush" style="min-height: 100px;"></div>
            </div>
            
            <div class="card p-4 shadow-sm mt-4 border-danger" style="background-color: #fffafa;">
                <h5 class="section-title text-danger border-danger" style="border-left-color: #dc3545 !important;">刪除旅程</h5>
                <p class="small text-muted mb-3">刪除旅程將會清空所有的帳目、還款與成員紀錄，此動作無法復原。</p>
                <button class="btn btn-outline-danger fw-bold w-100 shadow-sm" onclick="deleteTrip()"><i class="fa-solid fa-triangle-exclamation me-2"></i>刪除此旅行計畫</button>
            </div>
        </div>
    </div>

    <!-- 底部導航欄 -->
    <div class="bottom-nav">
        <div class="container-app d-flex justify-content-around w-100">
            <div id="nav-list" class="nav-item active" onclick="switchTab('list')"><i class="fa-solid fa-list-ul"></i>明細</div>
            <div id="nav-settlement" class="nav-item" onclick="switchTab('settlement')"><i class="fa-solid fa-chart-pie"></i>結算</div>
            <div id="nav-members" class="nav-item" onclick="switchTab('members')"><i class="fa-solid fa-user-group"></i>成員</div>
        </div>
    </div>
</div>

<!-- 帳目詳細資料 Modal -->
<div class="modal fade" id="expenseDetailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header text-white border-0" style="background-color: var(--bear-brown);">
                <h5 class="modal-title fw-bold" id="detailModalTitle"><i class="fa-solid fa-receipt me-2"></i>帳目詳細資料</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailModalBody"><div class="text-center my-4 text-muted">讀取中...</div></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let appUser = JSON.parse(localStorage.getItem('appUser')) || null;
    let tid = localStorage.getItem('currentTid') || null;
    let currentTripCode = localStorage.getItem('currentTripCode') || "";
    let currentTripTitle = localStorage.getItem('currentTripTitle') || "";
    let users = [], is_loading_edit = false, allExpensesCache = [], sortDesc = true;
    let ws = null; 
    let isRefreshing = false;

    // WebSocket 即時同步系統
    function connectWebSocket(tripId) {
        if (ws) ws.close();
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${window.location.host}/ws/trips/${tripId}`);
        ws.onmessage = async (event) => {
            if (event.data === "refresh") {
                const toast = document.getElementById('syncToast');
                if (toast) toast.style.opacity = '1';
                try { await triggerGlobalRefresh(); } 
                catch (e) { console.error("即時同步失敗", e); } 
                finally { if (toast) setTimeout(() => { toast.style.opacity = '0'; }, 2000); }
            }
        };
    }

    // API 攔截器
    async function apiFetch(url, options = {}) {
        if (!appUser) { logout(); return; }
        options.headers = options.headers || {};
        options.headers['Content-Type'] = 'application/json';
        options.headers['x-user-id'] = appUser.id.toString();

        const res = await fetch(url, options);
        if (res.status === 401) { logout(); throw new Error("授權失敗"); }
        if (!res.ok) { const err = await res.json(); alert(err.detail || "操作失敗"); throw new Error(err.detail); }
        return res.json();
    }

    // 登入系統邏輯
    function checkAuth() {
        if (appUser) {
            document.getElementById('pageAuth').classList.add('hidden');
            document.getElementById('displayUsername').innerText = `(${appUser.username})`;
            
            // [新增判斷] 如果有暫存的行程 ID，直接進入該行程；否則顯示首頁
            if (tid) {
                // 自動還原進入詳細畫面的動作
                showDetail(tid, currentTripTitle, currentTripCode);
            } else {
                document.getElementById('pageList').classList.remove('hidden');
                document.getElementById('pageDetail').classList.add('hidden');
                fetchTrips();
            }
        } else {
            document.getElementById('pageAuth').classList.remove('hidden');
            document.getElementById('pageList').classList.add('hidden');
            document.getElementById('pageDetail').classList.add('hidden');
        }
    }

    async function handleAuth(action) {
        const u = document.getElementById('authUsername').value, p = document.getElementById('authPassword').value;
        if (!u || !p) return alert("請輸入帳號密碼！");
        try {
            const res = await fetch(`/auth/${action}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, password: p}) });
            if (!res.ok) { const err = await res.json(); return alert(err.detail); }
            appUser = await res.json(); localStorage.setItem('appUser', JSON.stringify(appUser));
            checkAuth();
        } catch (e) { alert("連線錯誤"); }
    }

    function logout() { appUser = null; localStorage.removeItem('appUser'); if (ws) ws.close(); checkAuth(); }
    function goHome() { 
           tid = null; 
           localStorage.removeItem('currentTid');
           localStorage.removeItem('currentTripCode');
           localStorage.removeItem('currentTripTitle');
           
           if (ws) { ws.close(); ws = null; } 
           document.getElementById('pageDetail').classList.add('hidden'); 
           document.getElementById('pageList').classList.remove('hidden'); 
           fetchTrips(); 
       }

    // 防呆與 UI 控制
    function checkMemberLock() {
        const activeCount = users.filter(u => u.is_active).length, warning = document.getElementById('memberWarning'), fab = document.getElementById('fabBtn'), navList = document.getElementById('nav-list'), navSet = document.getElementById('nav-settlement');
        if (activeCount < 2) {
            if(warning) warning.classList.remove('hidden'); if(fab) fab.classList.add('hidden');
            if(navList) { navList.style.pointerEvents = 'none'; navList.style.opacity = '0.5'; }
            if(navSet) { navSet.style.pointerEvents = 'none'; navSet.style.opacity = '0.5'; }
        } else {
            if(warning) warning.classList.add('hidden'); if(fab) fab.classList.remove('hidden');
            if(navList) { navList.style.pointerEvents = 'auto'; navList.style.opacity = '1'; }
            if(navSet) { navSet.style.pointerEvents = 'auto'; navSet.style.opacity = '1'; }
        }
    }

    function switchTab(viewName) {
        if (users.filter(u => u.is_active).length < 2 && viewName !== 'members') return alert("⚠️ 請先加入至少 2 名旅伴！");
        document.querySelectorAll('.sub-view').forEach(v => v.classList.add('hidden'));
        const targetView = document.getElementById('view-' + viewName); if(targetView) targetView.classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const targetNav = document.getElementById('nav-' + viewName); if(targetNav) targetNav.classList.add('active');
        if (viewName === 'settlement') fetchSettlement(); window.scrollTo(0,0);
    }

    function openForm() { document.querySelectorAll('.sub-view').forEach(v => v.classList.add('hidden')); document.getElementById('view-form').classList.remove('hidden'); document.querySelector('.bottom-nav').classList.add('hidden'); window.scrollTo(0,0); }
    function closeForm() { resetForm(); switchTab('list'); document.querySelector('.bottom-nav').classList.remove('hidden'); }
    function setNow() {
        const now = new Date(), y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
        const dInput = document.getElementById('expDate'), tInput = document.getElementById('expTime');
        dInput.value = dInput.max = `${y}-${m}-${d}`; tInput.value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        dInput.onchange = tInput.onchange = checkFutureTime;
    }
    function checkFutureTime() {
        const now = new Date(), todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        const currentHhMm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const d = document.getElementById('expDate'), t = document.getElementById('expTime');
        if (d.value > todayStr) d.value = todayStr;
        if (d.value === todayStr && t.value > currentHhMm) t.value = currentHhMm;
    }

    async function triggerGlobalRefresh() {
        if (isRefreshing) return; 
        isRefreshing = true;
        try { await refreshUsers(); await fetchExpenseRecords(); await fetchSettlement(); } 
        catch (error) { console.error("同步失敗:", error); } 
        finally { isRefreshing = false; }
    }

    // --- 成員 API ---
    async function addUser() { const n = document.getElementById('userName').value; if(!n) return; await apiFetch(`/trips/${tid}/users?name=${n}`, {method:'POST'}); document.getElementById('userName').value = ''; await triggerGlobalRefresh(); }
    async function deleteUser(id) { if(confirm("確定離開？舊帳目會保留。")) { await apiFetch(`/users/${id}`, {method:'DELETE'}); await triggerGlobalRefresh(); } }
    async function restoreUser(id) { await apiFetch(`/users/${id}/restore`, {method:'PUT'}); await triggerGlobalRefresh(); }
    function enterUserEditMode(id, name) { document.getElementById(`user-item-${id}`).innerHTML = `<div class="input-group input-group-sm"><input type="text" class="form-control border-primary" id="edit-u-${id}" value="${name}"><button class="btn btn-primary" onclick="confirmUserEdit(${id})">✔</button></div>`; }
    async function confirmUserEdit(id) { await apiFetch(`/users/${id}?name=${document.getElementById(`edit-u-${id}`).value}`, {method:'PUT'}); await triggerGlobalRefresh(); }
    
    async function refreshUsers() {
        users = await apiFetch(`/trips/${tid}/users`); 
        document.getElementById('userActionList').innerHTML = users.map(u => `
            <div class="list-group-item d-flex justify-content-between align-items-center py-3 ${u.is_active ? '' : 'inactive-user'}" id="user-item-${u.id}">
                <span class="fw-bold">${u.name}</span>
                <div>${u.is_active ? `<i class="fa-solid fa-pen-to-square edit-icon action-icon" onclick="enterUserEditMode(${u.id}, '${u.name}')"></i><i class="fa-solid fa-trash delete-icon action-icon" onclick="deleteUser(${u.id})"></i>` : `<i class="fa-solid fa-rotate-left restore-icon action-icon" title="恢復成員" onclick="restoreUser(${u.id})"></i>`}</div>
            </div>`).join('');
        updateDropdowns(); checkMemberLock();
    }

    function updateDropdowns() {
        const activeUsers = users.filter(u => u.is_active);
        document.querySelectorAll('.user-select').forEach(select => {
            const currentVal = select.value, finalOptions = users.filter(u => u.is_active || u.id == currentVal);
            select.innerHTML = finalOptions.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
            if (currentVal) select.value = currentVal;
        });
        const sender = document.getElementById('repSender'), receiver = document.getElementById('repReceiver');
        if (activeUsers.length >= 2 && (!sender.value || sender.value === receiver.value)) { sender.value = activeUsers[0].id; receiver.value = activeUsers[1].id; }
        validateRepSelect();
    }
    function swapRepUsers() { const s = document.getElementById('repSender'), r = document.getElementById('repReceiver'); const temp = s.value; s.value = r.value; r.value = temp; validateRepSelect(); }
    function validateRepSelect() {
        const s = document.getElementById('repSender'), r = document.getElementById('repReceiver');
        Array.from(s.options).forEach(opt => opt.disabled = (opt.value === r.value && opt.value !== ""));
        Array.from(r.options).forEach(opt => opt.disabled = (opt.value === s.value && opt.value !== ""));
    }

    // --- 記帳 API 與 UI ---
    function checkIfEveryoneIsIncluded() {
        const selectedIds = Array.from(document.querySelectorAll('.splitter-row .user-select')).map(s => s.value).filter(v => v !== "");
        const uniqueIds = [...new Set(selectedIds)], activeCount = users.filter(u => u.is_active).length, toggle = document.getElementById('everyoneToggle');
        if (uniqueIds.length === activeCount && activeCount > 0) { toggle.checked = true; toggle.disabled = true; document.getElementById('manualAddBtn').disabled = true; } 
        else { toggle.checked = false; toggle.disabled = false; document.getElementById('manualAddBtn').disabled = false; }
    }
    function toggleEveryone() { if (is_loading_edit) return; if (document.getElementById('everyoneToggle').checked) { document.getElementById('splitterContainer').innerHTML = users.filter(u => u.is_active).map(u => createSplitRowHtml(u.id)).join(''); } handleGlobalChange(); }
    async function fetchRate() { try { const res = await fetch(`/get-rate/${document.getElementById('expCurr').value}`); const data = await res.json(); document.getElementById('expRate').value = data.rate.toFixed(4); handleGlobalChange(); } catch(e){} }
    
    function handleGlobalChange() {
        if (is_loading_edit) return;
        const isAuto = document.getElementById('autoSplitToggle').checked, total = parseFloat(document.getElementById('expAmount').value) || 0, pRows = document.querySelectorAll('.payer-row');
        if (pRows.length === 1 && total >= 0) pRows[0].querySelector('.payer-amount-input').value = total;
        const sRows = document.querySelectorAll('.splitter-row');
        if (isAuto && sRows.length > 0 && total > 0) {
            const avg = Math.floor((total / sRows.length) * 100) / 100, rem = Math.round((total - (avg * sRows.length)) * 100) / 100;
            document.querySelectorAll('.splitter-amount-input').forEach((input, i) => { input.value = (i === sRows.length - 1) ? (avg + rem).toFixed(2) : avg.toFixed(2); input.readOnly = true; input.classList.add('bg-readonly'); });
        } else { document.querySelectorAll('.splitter-amount-input').forEach(i => { i.readOnly = false; i.classList.remove('bg-readonly'); }); }
        
        checkIfEveryoneIsIncluded(); 
        const addPayerBtn = document.getElementById('addPayerBtn');
        if (addPayerBtn) addPayerBtn.disabled = (pRows.length >= users.filter(u => u.is_active).length && users.filter(u => u.is_active).length > 0);
        updateMutualExclusion(); validateAmounts();
    }
    function updateMutualExclusion() {
        const filter = (sel) => { const nodes = document.querySelectorAll(sel), vals = Array.from(nodes).map(n => n.value); nodes.forEach(n => Array.from(n.options).forEach(o => o.disabled = vals.includes(o.value) && o.value !== n.value)); };
        filter('.payer-user-select'); filter('.splitter-row .user-select');
    }
    function validateAmounts() {
        const total = parseFloat(document.getElementById('expAmount').value) || 0;
        const sumPaid = Array.from(document.querySelectorAll('.payer-amount-input')).reduce((s, i) => s + (parseFloat(i.value) || 0), 0);
        const sumSplit = Array.from(document.querySelectorAll('.splitter-amount-input')).reduce((s, i) => s + (parseFloat(i.value) || 0), 0);
        const isOk = Math.abs(sumPaid - total) < 0.1 && Math.abs(sumSplit - total) < 0.1 && total > 0;
        const status = document.getElementById('validationStatus');
        if (total > 0) {
            status.classList.remove('hidden'); status.className = isOk ? "alert alert-success mt-2 py-2 small fw-bold" : "alert alert-warning mt-2 py-2 small";
            status.innerHTML = isOk ? "✅ 金額正確" : `⚠️ 金額不符 (應為:${total})`;
            document.getElementById('saveBtn').disabled = !isOk;
        } else { status.classList.add('hidden'); document.getElementById('saveBtn').disabled = true; }
    }

    function createSplitRowHtml(userId = "") {
        const opts = users.filter(u => u.is_active || u.id == userId).map(u => `<option value="${u.id}" ${u.id==userId?'selected':''}>${u.name}</option>`).join('');
        return `<div class="input-group mb-2 splitter-row"><select class="form-select user-select" onchange="handleGlobalChange()">${opts}</select><input type="number" class="form-control row-amount splitter-amount-input" oninput="handleGlobalChange()"><button class="btn btn-outline-danger" onclick="removeRow(this)"><i class='fa-solid fa-minus'></i></button></div>`;
    }
    function manualAddSplitRow(forcedUserId = null) {
        let targetId = forcedUserId;
        if (!targetId) {
            const used = Array.from(document.querySelectorAll('.splitter-row .user-select')).map(s => s.value), next = users.filter(u => u.is_active).find(u => !used.includes(String(u.id)));
            if (!next) return null; targetId = next.id;
        }
        const div = document.createElement('div'); div.innerHTML = createSplitRowHtml(targetId);
        document.getElementById('splitterContainer').appendChild(div.firstElementChild); handleGlobalChange(); return document.getElementById('splitterContainer').lastElementChild;
    }
    function addRow(containerId, userId = "") {
        const container = document.getElementById(containerId), used = Array.from(container.querySelectorAll('.user-select')).map(s => s.value), next = users.filter(u => u.is_active).find(u => !used.includes(String(u.id)));
        const opts = users.map(u => `<option value="${u.id}" ${u.id == (userId || (next ? next.id : "")) ? 'selected' : ''}>${u.name}</option>`).join('');
        const div = document.createElement('div'); div.className = "input-group mb-2 payer-row";
        div.innerHTML = `<select class="form-select user-select payer-user-select" onchange="handleGlobalChange()">${opts}</select><input type="number" class="form-control row-amount payer-amount-input" oninput="validateAmounts()"><button class="btn btn-outline-danger" onclick="removeRow(this)"><i class='fa-solid fa-minus'></i></button>`;
        container.appendChild(div); handleGlobalChange(); return container.lastElementChild;
    }
    function removeRow(btn) { const container = btn.parentElement.parentElement; if(container.querySelectorAll('.input-group').length > 1) { btn.parentElement.remove(); handleGlobalChange(); } }

    async function saveExpense() {
        try {
            const id = document.getElementById('editingExpId').value;
            const payload = {
                description: document.getElementById('expDesc').value, consumption_date: document.getElementById('expDate').value, consumption_time: document.getElementById('expTime').value, currency: document.getElementById('expCurr').value, exchange_rate: parseFloat(document.getElementById('expRate').value), amount: parseFloat(document.getElementById('expAmount').value),
                payments: Array.from(document.querySelectorAll('.payer-row')).map(r => ({user_id: parseInt(r.querySelector('.user-select').value), amount_paid: parseFloat(r.querySelector('.row-amount').value)})),
                splits: Array.from(document.querySelectorAll('.splitter-row')).map(r => ({user_id: parseInt(r.querySelector('.user-select').value), amount_owed: parseFloat(r.querySelector('.row-amount').value)}))
            };
            await apiFetch(id ? `/expenses/${id}` : `/expenses?trip_id=${tid}`, { method: id ? 'PUT' : 'POST', body:JSON.stringify(payload) });
            await triggerGlobalRefresh(); closeForm(); 
        } catch (e) {}
    }

    async function loadExpenseForEdit(id) {
        is_loading_edit = true; openForm(); 
        const data = await apiFetch(`/expenses/${id}`);
        document.getElementById('editingExpId').value = id; document.getElementById('formModeTitle').innerText = "修正帳目中...";
        document.getElementById('mainEntryCard').classList.add('edit-mode-active'); document.getElementById('clearFormBtn').classList.add('hidden'); 
        document.getElementById('everyoneToggle').checked = false; document.getElementById('autoSplitToggle').checked = false;
        document.getElementById('expDesc').value = data.description; document.getElementById('expAmount').value = data.amount; document.getElementById('expCurr').value = data.currency; document.getElementById('expRate').value = data.exchange_rate; document.getElementById('expDate').value = data.date; document.getElementById('expTime').value = data.time;
        document.getElementById('payerContainer').innerHTML = ''; data.payments.forEach(p => addRow('payerContainer', p.user_id).querySelector('.payer-amount-input').value = p.amount);
        document.getElementById('splitterContainer').innerHTML = ''; data.splits.forEach(s => { const r = manualAddSplitRow(s.user_id); if(r) r.querySelector('.splitter-amount-input').value = s.amount; });
        is_loading_edit = false; handleGlobalChange(); 
    }

    function resetForm() {
        document.getElementById('editingExpId').value = ''; document.getElementById('formModeTitle').innerText = "新增花費";
        document.getElementById('mainEntryCard').classList.remove('edit-mode-active'); document.getElementById('clearFormBtn').classList.remove('hidden');
        document.getElementById('expDesc').value = ''; document.getElementById('expAmount').value = ''; document.getElementById('everyoneToggle').checked = false; document.getElementById('autoSplitToggle').checked = true;
        document.getElementById('payerContainer').innerHTML = ''; document.getElementById('splitterContainer').innerHTML = '';
        setNow(); manualAddSplitRow(); addRow('payerContainer'); handleGlobalChange();
    }

    async function deleteExpense(id) { if(confirm("刪除帳目？")) { await apiFetch(`/expenses/${id}`, {method:'DELETE'}); await triggerGlobalRefresh(); } }
    async function deleteRepayment(id) { if(confirm("撤銷還款紀錄？")) { await apiFetch(`/repayments/${id}`, {method:'DELETE'}); await triggerGlobalRefresh(); } }
    async function deleteTrip() { if(confirm("確定刪除整個行程與所有帳目？此動作無法復原！")) { await apiFetch(`/trips/${tid}`, {method:'DELETE'}); goHome(); } }

    async function saveRepayment() {
        const payload = { sender_id: parseInt(document.getElementById('repSender').value), receiver_id: parseInt(document.getElementById('repReceiver').value), amount: parseFloat(document.getElementById('repAmount').value) };
        if(!payload.amount || isNaN(payload.amount)) return alert("金額錯誤");
        const id = document.getElementById('editingRepId').value;
        await apiFetch(id ? `/repayments/${id}` : `/trips/${tid}/repayments`, { method: id ? 'PUT' : 'POST', body: JSON.stringify(payload) });
        resetRepaymentForm(); await triggerGlobalRefresh();
    }
    function loadRepaymentForEdit(id, sId, rId, amt) {
        document.getElementById('editingRepId').value = id; document.getElementById('repFormTitle').innerText = "修正還款...";
        document.getElementById('repaymentCard').classList.add('repayment-edit-active'); document.getElementById('cancelRepEditBtn').classList.remove('hidden');
        document.getElementById('repSender').value = sId; document.getElementById('repReceiver').value = rId; document.getElementById('repAmount').value = amt;
        validateRepSelect(); window.scrollTo(0,0);
    }
    function resetRepaymentForm() {
        document.getElementById('editingRepId').value = ''; document.getElementById('repFormTitle').innerText = "還款登記";
        document.getElementById('repaymentCard').classList.remove('repayment-edit-active'); document.getElementById('cancelRepEditBtn').classList.add('hidden');
        document.getElementById('repAmount').value = ''; updateDropdowns();
    }

    const currencyFlagMap = { "TWD": "🇹🇼 TWD", "JPY": "🇯🇵 JPY", "KRW": "🇰🇷 KRW", "USD": "🇺🇸 USD", "EUR": "🇪🇺 EUR", "HKD": "🇭🇰 HKD", "THB": "🇹🇭 THB", "VND": "🇻🇳 VND", "SGD": "🇸🇬 SGD", "CNY": "🇨🇳 CNY", "MOP": "🇲🇴 MOP", "GBP": "🇬🇧 GBP", "AUD": "🇦🇺 AUD", "CAD": "🇨🇦 CAD", "CHF": "🇨🇭 CHF" };

    async function fetchExpenseRecords() {
        allExpensesCache = await apiFetch(`/trips/${tid}/expenses`); 
        updateCurrencyFilterOptions(); renderExpenseRecords();
    }
    function updateCurrencyFilterOptions() {
        const filterSelect = document.getElementById('filterCurrency'), currentSelected = filterSelect.value, usedCurrencies = [...new Set(allExpensesCache.map(e => e.currency))];
        let optionsHtml = '<option value="">所有幣別</option>'; usedCurrencies.forEach(c => { optionsHtml += `<option value="${c}">${currencyFlagMap[c] || c}</option>`; });
        filterSelect.innerHTML = optionsHtml; if (usedCurrencies.includes(currentSelected)) filterSelect.value = currentSelected;
    }
    function renderExpenseRecords() {
        const keyword = document.getElementById('filterKeyword').value.toLowerCase(), curr = document.getElementById('filterCurrency').value, start = document.getElementById('filterStartDate').value, end = document.getElementById('filterEndDate').value;
        let filtered = allExpensesCache.filter(e => { return e.description.toLowerCase().includes(keyword) && (curr === "" || e.currency === curr) && (start === "" || e.consumption_date >= start) && (end === "" || e.consumption_date <= end); });
        filtered.sort((a, b) => { let timeA = new Date(`${a.consumption_date}T${a.consumption_time}`).getTime(), timeB = new Date(`${b.consumption_date}T${b.consumption_time}`).getTime(); return sortDesc ? timeB - timeA : timeA - timeB; });
        document.getElementById('expenseRecordList').innerHTML = filtered.map(e => `
            <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3" style="cursor: pointer; border-left: 5px solid var(--bear-brown);" onclick="openDetailModal(${e.id})">
                <div style="flex: 1;"><div class="fw-bold text-dark mb-1" style="font-size: 1.1rem;">${e.description}</div><div class="small text-muted"><i class="fa-regular fa-clock me-1"></i>${e.consumption_date} <span class="ms-1">${e.consumption_time}</span></div></div>
                <div class="text-end me-3"><div class="fw-bold text-primary" style="font-size: 1.2rem;">NT$ ${(e.amount * e.exchange_rate).toFixed(0)}</div><div class="small text-muted">${e.amount} ${e.currency}</div></div>
                <div class="d-flex flex-column gap-2" style="z-index: 2;"><button class="btn btn-sm btn-light border text-primary shadow-sm" onclick="event.stopPropagation(); loadExpenseForEdit(${e.id})" title="編輯"><i class="fa-solid fa-pen"></i></button><button class="btn btn-sm btn-light border text-danger shadow-sm" onclick="event.stopPropagation(); deleteExpense(${e.id})" title="刪除"><i class="fa-solid fa-trash"></i></button></div>
            </div>`).join('');
    }

    async function openDetailModal(id) {
        const modal = new bootstrap.Modal(document.getElementById('expenseDetailModal')); modal.show();
        document.getElementById('detailModalBody').innerHTML = '<div class="text-center my-4 text-muted"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><div class="mt-2">讀取詳細資料中...</div></div>';
        try {
            const data = await apiFetch(`/expenses/${id}`); const userMap = {}; users.forEach(u => userMap[u.id] = u.name);
            document.getElementById('detailModalBody').innerHTML = `
                <div class="text-center mb-4"><h4 class="fw-bold text-primary mb-1">${data.description}</h4><span class="badge bg-light text-secondary border"><i class="fa-regular fa-calendar me-1"></i>${data.date} ${data.time}</span></div>
                <div class="mb-3"><h6 class="fw-bold text-success border-bottom pb-2"><i class="fa-solid fa-wallet me-2"></i>付款明細 (代墊者)</h6><ul class="list-group list-group-flush mb-2">${data.payments.map(p => `<li class="list-group-item d-flex justify-content-between px-2 py-2 bg-transparent align-items-center"><span class="text-dark fw-bold">${userMap[p.user_id] || '未知成員'}</span><div class="text-end"><span class="fw-bold d-block">${p.amount} <small class="text-muted">${data.currency}</small></span><span class="small text-muted">約 NT$ ${(p.amount * data.exchange_rate).toFixed(0)}</span></div></li>`).join('')}</ul></div>
                <div class="mb-3"><h6 class="fw-bold text-danger border-bottom pb-2"><i class="fa-solid fa-users me-2"></i>分攤明細 (應付者)</h6><ul class="list-group list-group-flush mb-2">${data.splits.map(s => `<li class="list-group-item d-flex justify-content-between px-2 py-2 bg-transparent align-items-center"><span class="text-dark fw-bold">${userMap[s.user_id] || '未知成員'}</span><div class="text-end"><span class="fw-bold d-block">${s.amount} <small class="text-muted">${data.currency}</small></span><span class="small text-muted">約 NT$ ${(s.amount * data.exchange_rate).toFixed(0)}</span></div></li>`).join('')}</ul></div>
                <div class="alert alert-primary mt-3 mb-0 text-center shadow-sm" style="background-color: var(--honey-color); border:none; color: var(--text-dark);"><div class="small mb-1">總收據金額：${data.amount} ${data.currency} (匯率 ${data.exchange_rate})</div><div class="fw-bold fs-5">總計台幣：NT$ ${(data.amount * data.exchange_rate).toFixed(0)}</div></div>
            `;
        } catch (err) { document.getElementById('detailModalBody').innerHTML = '<div class="text-danger text-center fw-bold my-4">❌ 無法讀取詳細資料，請稍後再試。</div>'; }
    }

    function toggleSortOrder() { sortDesc = !sortDesc; document.getElementById('sortOrderBtn').innerHTML = sortDesc ? '<i class="fa-solid fa-arrow-down-wide-short text-primary"></i> 新到舊' : '<i class="fa-solid fa-arrow-up-short-wide text-primary"></i> 舊到新'; renderExpenseRecords(); }
    function clearFilters() { document.getElementById('filterKeyword').value = ''; document.getElementById('filterCurrency').value = ''; document.getElementById('filterStartDate').value = ''; document.getElementById('filterEndDate').value = ''; sortDesc = true; document.getElementById('sortOrderBtn').innerHTML = '<i class="fa-solid fa-arrow-down-wide-short text-primary"></i> 新到舊'; renderExpenseRecords(); }

    async function fetchSettlement() {
        const data = await apiFetch(`/trips/${tid}/settlement`);
        document.querySelector("#repaymentProgressBar .progress-bar").style.width = data.progress + "%"; document.querySelector("#repaymentProgressBar .progress-bar").innerText = data.progress + "%"; document.getElementById('progressText').innerText = `目前總結帳進度 ${data.progress}%`;
        document.getElementById('settlementBox').innerHTML = data.balances.map(i => `<div class="col-md-6 col-12"><div class="p-3 border rounded-4 bg-white shadow-sm"><div class="d-flex justify-content-between"><span>${i.name}</span><span class="badge ${i.balance>=0?'bg-success-subtle text-success':'bg-danger-subtle text-danger'}">${i.status}</span></div><h4 class="mt-1 fw-bold ${i.balance>=0?'text-success':'text-danger'}">NT$ ${Math.abs(i.balance).toLocaleString()}</h4></div></div>`).join('');
        const reps = await apiFetch(`/trips/${tid}/repayments`); const userMap = {}; users.forEach(u => userMap[u.id] = u.name);
        document.getElementById('repaymentHistory').innerHTML = reps.map(r => `
            <div class="repayment-item d-flex justify-content-between align-items-center bg-white rounded p-2 mb-2 shadow-sm border border-light">
                <span class="text-dark"><b>${userMap[r.sender_id]}</b> → ${userMap[r.receiver_id]} <b style="color: var(--bear-brown);">$${r.amount}</b></span>
                <div class="text-end" style="min-width: 60px;">
                    <i class="fa-solid fa-pen edit-icon action-icon small" onclick="loadRepaymentForEdit(${r.id}, ${r.sender_id}, ${r.receiver_id}, ${r.amount})"></i>
                    <i class="fa-solid fa-trash delete-icon action-icon small" onclick="deleteRepayment(${r.id})"></i>
                </div>
            </div>`).join('');
    }

    async function fetchTrips() {
        const data = await apiFetch('/trips');
        document.getElementById('tripList').innerHTML = data.map(t => `<li class="list-group-item d-flex justify-content-between align-items-center py-4 border-0 border-bottom"><div><i class="fa-solid fa-location-dot me-2 text-primary"></i><span class="h5 fw-bold mb-0 text-dark">${t.title}</span><br><span class="badge bg-light text-secondary border mt-1">邀請碼: ${t.invite_code}</span></div><button class="btn btn-primary btn-enter-trip rounded-pill px-3" onclick="showDetail(${t.id},'${t.title}','${t.invite_code}')">進入系統 <i class='fa-solid fa-arrow-right-to-bracket ms-1'></i></button></li>`).join('');
    }
    
    async function addTrip() { const t = document.getElementById('tripTitle').value; if(t) { await apiFetch(`/trips?title=${t}`, {method:'POST'}); document.getElementById('tripTitle').value = ''; fetchTrips(); } }
    
    async function joinTrip() {
        const code = document.getElementById('inviteCodeInput').value;
        if(code.length < 6) return alert("邀請碼不正確！");
        try { await apiFetch(`/trips/join?code=${code}`, {method:'POST'}); document.getElementById('inviteCodeInput').value = ''; alert("✅ 成功加入旅程！"); fetchTrips(); } catch(e) {}
    }

    async function showDetail(id, title, invite_code) { 
        tid = id; currentTripCode = invite_code;
        localStorage.setItem('currentTid', id);
        localStorage.setItem('currentTripCode', invite_code || "");
        localStorage.setItem('currentTripTitle', title || "");
        document.getElementById('pageList').classList.add('hidden'); document.getElementById('pageDetail').classList.remove('hidden'); 
        document.getElementById('currentTripTitle').innerText = title; document.getElementById('tripInviteCode').innerText = invite_code;
        
        connectWebSocket(id); 

        setNow(); await triggerGlobalRefresh(); 
        const activeCount = users.filter(u => u.is_active).length;
        if (activeCount < 2) switchTab('members'); else switchTab('list');    
        if(!document.getElementById('splitterContainer').innerHTML) manualAddSplitRow(); 
        if(!document.getElementById('payerContainer').innerHTML) addRow('payerContainer'); 
    }

    function copyInviteCode() { navigator.clipboard.writeText(currentTripCode); alert(`已複製邀請碼：${currentTripCode}`); }

    window.onload = checkAuth;
</script>
